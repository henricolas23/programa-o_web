<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Avengers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <section id="home-screen">
      <h1>Descubra Qual Avenger Você Seria</h1>
      <p class="subtitle">Um quiz interativo inspirado no universo dos Vingadores.</p>
      <p>
        Responda 10 perguntas e descubra com qual personagem você mais combina.
      </p>
      <button class="btn" id="start-btn">Começar Quiz</button>
    </section>

    <section id="quiz-screen" class="hidden">
      <div class="question-box">
        <div class="progress" id="progress"></div>
        <h2 class="question-title" id="question-title"></h2>
        <div class="options" id="options-container"></div>

        <div class="actions">
          <button class="btn btn-secondary" id="prev-btn">Voltar</button>
          <button class="btn" id="next-btn">Próxima</button>
        </div>
      </div>
    </section>

    <section id="result-screen" class="hidden">
      <h2>Seu resultado</h2>

      <div class="result-card">
        <img id="result-image" src="" alt="Imagem do personagem" />

        <div>
          <h2 id="result-name"></h2>
          <p id="result-description"></p>
          <p>
            <strong>Pontuação do personagem vencedor:</strong>
            <span id="result-score"></span>
          </p>

          <h3 class="score-title">Pontuação geral</h3>
          <ul class="score-list" id="score-list"></ul>

          <button class="btn" id="restart-btn">Recomeçar</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
